<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HireX Resume Analyzer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            text-align: center;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }
        .header img {
            height: 40px;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
        <h1>HireX</h1>
    </div>

    <p>Upload resumes and job requirements to evaluate candidates.</p>

    <form action="/analyze" method="post" enctype="multipart/form-data">
        <textarea name="requirements" rows="6" cols="60" placeholder="Enter job requirements here..." required></textarea><br><br>
        <input type="file" name="files" multiple required><br><br>
        <button type="submit">Analyze</button>
    </form>
</body>
</html>
